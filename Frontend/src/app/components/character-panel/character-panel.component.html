<div class="character-panel card">
  <!-- Pixel art character SVG -->
  <div class="avatar-wrap float" 
       [ngStyle]="avatarStyle" 
       (click)="cycleMood()"[class.mood-excited]="mood === 'excited'"
       [class.mood-tired]="mood === 'tired'"
       title="Clic para saludar!">
       
    <svg class="pixel-art character-svg" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="16" cy="39" rx="8" ry="1.5" fill="#000000" opacity="0.2"/>
      
      <!-- BODY -->
      <g class="sprite-body">
        <g [ngSwitch]="hair">
          <g *ngSwitchCase="'short'"><rect x="5" y="8" width="22" height="10" fill="var(--pixel-hair)"/><rect x="5" y="15" width="22" height="3" fill="#000000" opacity="0.15"/></g>
          <g *ngSwitchCase="'twintails'"></g>
          <g *ngSwitchCase="'ponytail'"><rect x="17" y="4" width="10" height="22" fill="var(--pixel-hair)"/><rect x="17" y="20" width="10" height="6" fill="#000000" opacity="0.15"/></g>
          <g *ngSwitchCase="'spiky'"><rect x="6" y="8" width="20" height="5" fill="var(--pixel-hair)"/></g>
          <g *ngSwitchDefault><rect x="6" y="8" width="20" height="2" fill="var(--pixel-hair)"/><rect x="4" y="10" width="24" height="23" fill="var(--pixel-hair)"/><rect x="4" y="27" width="24" height="6" fill="#000000" opacity="0.2"/><rect x="5" y="33" width="22" height="2" fill="#000000" opacity="0.3"/><rect x="4" y="20" width="24" height="15" fill="#000000" opacity="0.1"/></g>
        </g>
        <rect x="12" y="31" width="2" height="3" fill="var(--pixel-skin)"/><rect x="18" y="31" width="2" height="3" fill="var(--pixel-skin)"/><rect x="12" y="31" width="2" height="1" fill="#000000" opacity="0.3"/><rect x="18" y="31" width="2" height="1" fill="#000000" opacity="0.3"/>
        <rect x="12" y="34" width="2" height="3" fill="#2a2a35"/><rect x="18" y="34" width="2" height="3" fill="#2a2a35"/>
        <rect x="11" y="37" width="3" height="2" fill="#111111"/><rect x="18" y="37" width="3" height="2" fill="#111111"/><rect x="11" y="37" width="1" height="1" fill="#ffffff" opacity="0.4"/><rect x="18" y="37" width="1" height="1" fill="#ffffff" opacity="0.4"/>
        <rect x="8" y="24" width="3" height="6" fill="var(--pixel-dress)"/><rect x="21" y="24" width="3" height="6" fill="var(--pixel-dress)"/><rect x="8" y="28" width="3" height="2" fill="#000000" opacity="0.2"/><rect x="21" y="28" width="3" height="2" fill="#000000" opacity="0.2"/>
        <rect x="8" y="30" width="2" height="2" fill="var(--pixel-skin)"/><rect x="22" y="30" width="2" height="2" fill="var(--pixel-skin)"/>
        <rect x="11" y="23" width="10" height="6" fill="var(--pixel-dress)"/><rect x="10" y="29" width="12" height="3" fill="var(--pixel-dress)"/><rect x="9" y="31" width="14" height="1" fill="var(--pixel-dress)"/><rect x="11" y="23" width="1" height="6" fill="#000000" opacity="0.2"/><rect x="20" y="23" width="1" height="6" fill="#000000" opacity="0.2"/><rect x="10" y="31" width="12" height="1" fill="#000000" opacity="0.25"/><rect x="11" y="26" width="10" height="1" fill="#000000" opacity="0.15"/>
        <rect x="13" y="23" width="6" height="2" fill="#ffffff"/><rect x="14" y="25" width="4" height="1" fill="#dddddd"/><rect x="15" y="24" width="2" height="3" fill="#222222"/>
      </g>

      <!-- HEAD -->
      <g class="sprite-head">
        <rect x="14" y="21" width="4" height="3" fill="var(--pixel-skin)"/><rect x="14" y="21" width="4" height="2" fill="#000000" opacity="0.25"/>
        <rect x="8" y="10" width="16" height="12" fill="var(--pixel-skin)"/><rect x="7" y="11" width="18" height="10" fill="var(--pixel-skin)"/><rect x="7" y="11" width="18" height="3" fill="#000000" opacity="0.1"/>
        
        <g *ngIf="mood !== 'tired'">
          <rect x="9" y="14" width="4" height="4" fill="#1a1a24"/><rect x="19" y="14" width="4" height="4" fill="#1a1a24"/><rect x="8" y="14" width="1" height="1" fill="#1a1a24"/><rect x="23" y="14" width="1" height="1" fill="#1a1a24"/>
          <rect x="10" y="15" width="2" height="3" fill="var(--pixel-eyes)"/><rect x="20" y="15" width="2" height="3" fill="var(--pixel-eyes)"/><rect x="10" y="15" width="2" height="1" fill="#000000" opacity="0.6"/><rect x="20" y="15" width="2" height="1" fill="#000000" opacity="0.6"/>
          <rect x="11" y="15" width="1" height="2" fill="#ffffff"/><rect x="21" y="15" width="1" height="2" fill="#ffffff"/><rect x="10" y="17" width="2" height="1" fill="#ffffff" opacity="0.3"/><rect x="20" y="17" width="2" height="1" fill="#ffffff" opacity="0.3"/>
        </g>
        <g *ngIf="mood === 'tired'">
          <rect x="9" y="16" width="4" height="2" fill="#1a1a24"/><rect x="19" y="16" width="4" height="2" fill="#1a1a24"/><rect x="8" y="16" width="1" height="1" fill="#1a1a24"/><rect x="23" y="16" width="1" height="1" fill="#1a1a24"/>
          <rect x="10" y="17" width="2" height="1" fill="var(--pixel-eyes)"/><rect x="20" y="17" width="2" height="1" fill="var(--pixel-eyes)"/>
        </g>
        <g *ngIf="mood === 'excited'"><rect x="7" y="13" width="1" height="1" fill="#ffd700"/><rect x="24" y="13" width="1" height="1" fill="#ffd700"/><rect x="10" y="12" width="1" height="1" fill="#ffd700"/><rect x="21" y="12" width="1" height="1" fill="#ffd700"/></g>
        
        <rect x="7" y="17" width="2" height="1" fill="#ff7790" opacity="0.5"/><rect x="23" y="17" width="2" height="1" fill="#ff7790" opacity="0.5"/>
        <rect *ngIf="mood === 'happy'" x="15" y="18" width="2" height="1" fill="#d97382"/><rect *ngIf="mood === 'excited'" x="14" y="18" width="4" height="2" fill="#d97382"/><rect *ngIf="mood === 'tired'" x="15" y="18" width="2" height="1" fill="#9a8c98"/>
        
        <!-- HAIR FRONT -->
        <g [ngSwitch]="hair">
          <g *ngSwitchCase="'spiky'">
            <rect x="7" y="3" width="18" height="6" fill="var(--pixel-hair)"/><rect x="8" y="2" width="3" height="2" fill="var(--pixel-hair)"/><rect x="13" y="2" width="4" height="2" fill="var(--pixel-hair)"/><rect x="20" y="2" width="3" height="2" fill="var(--pixel-hair)"/>
            <rect x="6" y="9" width="20" height="3" fill="var(--pixel-hair)"/><rect x="6" y="12" width="2" height="2" fill="var(--pixel-hair)"/><rect x="10" y="12" width="3" height="1" fill="var(--pixel-hair)"/><rect x="15" y="12" width="2" height="2" fill="var(--pixel-hair)"/><rect x="20" y="12" width="3" height="1" fill="var(--pixel-hair)"/><rect x="24" y="12" width="2" height="2" fill="var(--pixel-hair)"/>
            <rect x="9" y="6" width="14" height="1" fill="#ffffff" opacity="0.25"/>
          </g>
          <g *ngSwitchDefault>
            <rect x="8" y="5" width="16" height="5" fill="var(--pixel-hair)"/><rect x="9" y="4" width="14" height="1" fill="var(--pixel-hair)"/><rect x="6" y="7" width="20" height="5" fill="var(--pixel-hair)"/><rect x="6" y="12" width="4" height="2" fill="var(--pixel-hair)"/><rect x="12" y="12" width="8" height="1" fill="var(--pixel-hair)"/><rect x="22" y="12" width="4" height="2" fill="var(--pixel-hair)"/><rect x="14" y="13" width="3" height="1" fill="var(--pixel-hair)"/>
            <rect x="9" y="7" width="14" height="1" fill="#ffffff" opacity="0.25"/><rect x="8" y="8" width="1" height="1" fill="#ffffff" opacity="0.25"/><rect x="23" y="8" width="1" height="1" fill="#ffffff" opacity="0.25"/>
            <g *ngIf="hair === 'short' || hair === 'twintails' || hair === 'ponytail'"><rect x="5" y="11" width="3" height="5" fill="var(--pixel-hair)"/><rect x="24" y="11" width="3" height="5" fill="var(--pixel-hair)"/></g>
            <g *ngIf="hair === 'long' || !hair"><rect x="5" y="11" width="3" height="11" fill="var(--pixel-hair)"/><rect x="24" y="11" width="3" height="11" fill="var(--pixel-hair)"/><rect x="5" y="19" width="3" height="3" fill="#000000" opacity="0.3"/><rect x="24" y="19" width="3" height="3" fill="#000000" opacity="0.3"/></g>
            <g *ngIf="hair === 'twintails'"><rect x="1" y="10" width="6" height="18" fill="var(--pixel-hair)"/><rect x="25" y="10" width="6" height="18" fill="var(--pixel-hair)"/><rect x="3" y="9" width="4" height="3" fill="var(--pixel-accessory)"/><rect x="25" y="9" width="4" height="3" fill="var(--pixel-accessory)"/><rect x="4" y="9" width="1" height="1" fill="#ffffff" opacity="0.5"/><rect x="26" y="9" width="1" height="1" fill="#ffffff" opacity="0.5"/></g>
            <g *ngIf="hair === 'ponytail'"><rect x="17" y="4" width="4" height="4" fill="var(--pixel-accessory)"/><rect x="18" y="4" width="1" height="1" fill="#ffffff" opacity="0.5"/></g>
          </g>
        </g>

        <!-- ACCESSORIES -->
        <g *ngIf="acc === 'headphones'"><rect x="6" y="4" width="20" height="2" fill="var(--pixel-accessory)"/><rect x="3" y="11" width="3" height="7" fill="var(--pixel-accessory)"/><rect x="26" y="11" width="3" height="7" fill="var(--pixel-accessory)"/><rect x="4" y="12" width="1" height="5" fill="#ffffff" opacity="0.4"/><rect x="27" y="12" width="1" height="5" fill="#ffffff" opacity="0.4"/></g>
        <g *ngIf="acc === 'bow'"><rect x="13" y="4" width="6" height="4" fill="var(--pixel-accessory)"/><rect x="12" y="5" width="8" height="2" fill="var(--pixel-accessory)"/><rect x="15" y="5" width="2" height="2" fill="#000000" opacity="0.2"/><rect x="14" y="4" width="1" height="1" fill="#ffffff" opacity="0.4"/><rect x="17" y="4" width="1" height="1" fill="#ffffff" opacity="0.4"/></g>
        <g *ngIf="acc === 'star-clips'"><rect x="23" y="12" width="1" height="4" fill="var(--pixel-accessory)"/><rect x="22" y="13" width="3" height="2" fill="var(--pixel-accessory)"/><rect x="23" y="13" width="1" height="1" fill="#ffffff" opacity="0.5"/></g>
        <g *ngIf="acc === 'glasses'"><rect x="7" y="13" width="7" height="6" fill="#ffffff" opacity="0.15"/><rect x="18" y="13" width="7" height="6" fill="#ffffff" opacity="0.15"/><rect x="7" y="13" width="7" height="1" fill="var(--pixel-accessory)"/><rect x="7" y="18" width="7" height="1" fill="var(--pixel-accessory)"/><rect x="7" y="14" width="1" height="4" fill="var(--pixel-accessory)"/><rect x="13" y="14" width="1" height="4" fill="var(--pixel-accessory)"/><rect x="18" y="13" width="7" height="1" fill="var(--pixel-accessory)"/><rect x="18" y="18" width="7" height="1" fill="var(--pixel-accessory)"/><rect x="18" y="14" width="1" height="4" fill="var(--pixel-accessory)"/><rect x="24" y="14" width="1" height="4" fill="var(--pixel-accessory)"/><rect x="14" y="14" width="4" height="1" fill="var(--pixel-accessory)"/><rect x="8" y="14" width="2" height="1" fill="#ffffff" opacity="0.5"/><rect x="19" y="14" width="2" height="1" fill="#ffffff" opacity="0.5"/></g>
        <g *ngIf="acc === 'cat-ears'"><rect x="6" y="2" width="4" height="4" fill="var(--pixel-accessory)"/><rect x="7" y="0" width="2" height="2" fill="var(--pixel-accessory)"/><rect x="7" y="2" width="2" height="2" fill="#ffb6c1" opacity="0.8"/><rect x="22" y="2" width="4" height="4" fill="var(--pixel-accessory)"/><rect x="23" y="0" width="2" height="2" fill="var(--pixel-accessory)"/><rect x="23" y="2" width="2" height="2" fill="#ffb6c1" opacity="0.8"/></g>
        <g *ngIf="acc === 'flower'"><rect x="22" y="7" width="5" height="5" fill="var(--pixel-accessory)"/><rect x="23" y="6" width="3" height="1" fill="var(--pixel-accessory)"/><rect x="23" y="12" width="3" height="1" fill="var(--pixel-accessory)"/><rect x="21" y="8" width="1" height="3" fill="var(--pixel-accessory)"/><rect x="27" y="8" width="1" height="3" fill="var(--pixel-accessory)"/><rect x="22" y="7" width="3" height="1" fill="#ffffff" opacity="0.4"/><rect x="22" y="11" width="5" height="1" fill="#000000" opacity="0.2"/><rect x="23" y="8" width="3" height="3" fill="#ffffff"/><rect x="24" y="9" width="1" height="1" fill="#ffd700"/></g>
        <g *ngIf="acc === 'crown'"><rect x="11" y="3" width="10" height="3" fill="var(--pixel-accessory)"/><rect x="11" y="1" width="2" height="2" fill="var(--pixel-accessory)"/><rect x="15" y="1" width="2" height="2" fill="var(--pixel-accessory)"/><rect x="19" y="1" width="2" height="2" fill="var(--pixel-accessory)"/><rect x="11" y="5" width="10" height="1" fill="#000000" opacity="0.2"/><rect x="15" y="3" width="2" height="1" fill="#ffffff"/><rect x="11" y="3" width="1" height="1" fill="#ffffff" opacity="0.5"/><rect x="20" y="3" width="1" height="1" fill="#ffffff" opacity="0.5"/></g>
        <g *ngIf="acc === 'halo'"><rect x="10" y="0" width="12" height="1" fill="var(--pixel-accessory)"/><rect x="8" y="1" width="2" height="2" fill="var(--pixel-accessory)"/><rect x="22" y="1" width="2" height="2" fill="var(--pixel-accessory)"/><rect x="10" y="3" width="12" height="1" fill="var(--pixel-accessory)"/><rect x="10" y="0" width="12" height="1" fill="#ffffff" opacity="0.6"/></g>
      </g>
    </svg>

    <!-- Partículas ambientales -->
    <span class="sparkle s1">✦</span>
    <span class="sparkle s2">✧</span>
    <span class="sparkle s3">⊹</span>
  </div>

  <!-- Name -->
  <div class="char-name-wrap">
    <div *ngIf="!editingName()" class="char-name" (click)="startEditName()" title="Click to edit">{{ game.character().name }}<span class="edit-hint">✏️</span></div>
    <input *ngIf="editingName()" class="name-input"[(ngModel)]="tempName" (keyup.enter)="saveName()" (blur)="saveName()" autofocus maxlength="20"/>
  </div>

  <!-- Title -->
  <div class="char-title-wrap">
    <div *ngIf="!editingTitle()" class="char-title" (click)="startEditTitle()" title="Click to edit">✦ {{ game.character().title }} ✦</div>
    <input *ngIf="editingTitle()" class="title-input" [(ngModel)]="tempTitle" (keyup.enter)="saveTitle()" (blur)="saveTitle()" autofocus maxlength="30"/>
  </div>

  <div class="level-badge"><span class="pixel">Lv.{{ game.character().level }}</span></div>

  <!-- Mini skills -->
  <div class="mini-skills">
    <div class="mini-skill" *ngFor="let skill of topSkills" (click)="gainSkillXp(skill.id)">
      <span class="skill-icon">{{ skill.icon }}</span>
      <div class="skill-info">
        <span class="skill-name">{{ skill.name }}</span>
        <div class="progress-track skill-track"><div class="progress-fill" [style.width.%]="(skill.xp / skill.xpToNext) * 100" [style.background]="skill.color"></div></div>
      </div>
      <span class="skill-lvl">{{ skill.level }}</span>
    </div>
  </div>
</div>
