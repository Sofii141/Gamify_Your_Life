<div class="character-panel card">
  <!-- Pixel art character SVG -->
  <div class="avatar-wrap float" [ngStyle]="avatarStyle">
    <svg class="pixel-art character-svg" viewBox="0 0 24 40" xmlns="http://www.w3.org/2000/svg">
      <!-- Twintails -->
      <rect x="0"  y="7"  width="4" height="25" fill="var(--pixel-hair)"/>
      <rect x="0"  y="32" width="3" height="4"  fill="var(--pixel-hair)"/>
      <rect x="1"  y="36" width="2" height="2"  fill="var(--pixel-hair)"/>
      <rect x="20" y="7"  width="4" height="25" fill="var(--pixel-hair)"/>
      <rect x="21" y="32" width="3" height="4"  fill="var(--pixel-hair)"/>
      <rect x="21" y="36" width="2" height="2"  fill="var(--pixel-hair)"/>
      <!-- Coat -->
      <rect x="9"  y="17" width="6"  height="1" fill="var(--pixel-dress)"/>
      <rect x="8"  y="18" width="8"  height="1" fill="var(--pixel-dress)"/>
      <rect x="6"  y="19" width="12" height="7" fill="var(--pixel-dress)"/>
      <rect x="7"  y="26" width="10" height="1" fill="var(--pixel-dress)"/>
      <rect x="8"  y="27" width="8"  height="1" fill="var(--pixel-dress)"/>
      <rect x="3"  y="19" width="4"  height="7" fill="var(--pixel-dress)"/>
      <rect x="3"  y="26" width="3"  height="1" fill="var(--pixel-skin)"/>
      <rect x="17" y="19" width="4"  height="7" fill="var(--pixel-dress)"/>
      <rect x="18" y="26" width="3"  height="1" fill="var(--pixel-skin)"/>
      <rect x="8"  y="21" width="3"  height="1" fill="#ffffff"/>
      <rect x="9"  y="20" width="1"  height="3" fill="#ffffff"/>
      <rect x="13" y="21" width="3"  height="1" fill="#ffffff"/>
      <rect x="14" y="20" width="1"  height="3" fill="#ffffff"/>
      <!-- Skirt -->
      <rect x="7"  y="28" width="10" height="1" fill="#1e1520"/>
      <rect x="5"  y="29" width="14" height="4" fill="#1e1520"/>
      <rect x="6"  y="33" width="12" height="1" fill="#1e1520"/>
      <!-- Leg warmers -->
      <rect x="7"  y="34" width="4"  height="4" fill="#e0d4c4"/>
      <rect x="13" y="34" width="4"  height="4" fill="#e0d4c4"/>
      <!-- Shoes -->
      <rect x="6"  y="38" width="5"  height="2" fill="#1e1520"/>
      <rect x="6"  y="38" width="2"  height="2" fill="#cc2222"/>
      <rect x="13" y="38" width="5"  height="2" fill="#1e1520"/>
      <rect x="16" y="38" width="2"  height="2" fill="#cc2222"/>
      <!-- Head hair -->
      <rect x="11" y="0"  width="2"  height="1" fill="var(--pixel-hair)"/>
      <rect x="10" y="1"  width="4"  height="1" fill="var(--pixel-hair)"/>
      <rect x="11" y="1"  width="1"  height="1" fill="#ffffff" opacity="0.5"/>
      <rect x="7"  y="2"  width="10" height="1" fill="var(--pixel-hair)"/>
      <rect x="5"  y="3"  width="14" height="1" fill="var(--pixel-hair)"/>
      <rect x="4"  y="4"  width="4"  height="11" fill="var(--pixel-hair)"/>
      <rect x="16" y="4"  width="4"  height="11" fill="var(--pixel-hair)"/>
      <rect x="5"  y="14" width="3"  height="2"  fill="var(--pixel-hair)"/>
      <rect x="16" y="14" width="3"  height="2"  fill="var(--pixel-hair)"/>
      <!-- Face -->
      <rect x="8"  y="3"  width="8"  height="1"  fill="var(--pixel-skin)"/>
      <rect x="7"  y="4"  width="10" height="10" fill="var(--pixel-skin)"/>
      <rect x="8"  y="14" width="8"  height="1"  fill="var(--pixel-skin)"/>
      <rect x="9"  y="15" width="6"  height="1"  fill="var(--pixel-skin)"/>
      <rect x="10" y="15" width="4"  height="3"  fill="var(--pixel-skin)"/>
      <!-- Eyes -->
      <rect x="8"  y="6" width="3" height="1" fill="var(--pixel-eyes)"/>
      <rect x="8"  y="7" width="2" height="1" fill="var(--pixel-eyes)"/>
      <rect x="10" y="7" width="1" height="1" fill="#ffffff"/>
      <rect x="13" y="6" width="3" height="1" fill="var(--pixel-eyes)"/>
      <rect x="14" y="7" width="2" height="1" fill="var(--pixel-eyes)"/>
      <rect x="13" y="7" width="1" height="1" fill="#ffffff"/>
      <!-- Blush + mouth -->
      <rect x="7"  y="9" width="2" height="1" fill="#ffa8c0"/>
      <rect x="15" y="9" width="2" height="1" fill="#ffa8c0"/>
      <rect x="10" y="11" width="4" height="1" fill="#e879a0"/>
      <!-- Accessories -->
      <g *ngIf="(game.character().accessory ?? 'none') === 'headphones'">
        <rect x="5"  y="3" width="14" height="1" fill="var(--pixel-accessory)"/>
        <rect x="3"  y="4" width="3"  height="5" fill="var(--pixel-accessory)"/>
        <rect x="18" y="4" width="3"  height="5" fill="var(--pixel-accessory)"/>
        <rect x="3"  y="4" width="1"  height="1" fill="#ffffff" opacity="0.4"/>
        <rect x="20" y="4" width="1"  height="1" fill="#ffffff" opacity="0.4"/>
      </g>
      <g *ngIf="(game.character().accessory ?? 'none') === 'bow'">
        <rect x="6"  y="2" width="4" height="2" fill="var(--pixel-accessory)"/>
        <rect x="14" y="2" width="4" height="2" fill="var(--pixel-accessory)"/>
        <rect x="10" y="2" width="4" height="2" fill="var(--pixel-accessory)"/>
        <rect x="6"  y="2" width="1" height="1" fill="#ffffff" opacity="0.5"/>
        <rect x="17" y="2" width="1" height="1" fill="#ffffff" opacity="0.5"/>
      </g>
      <g *ngIf="(game.character().accessory ?? 'none') === 'star-clips'">
        <rect x="4"  y="6" width="1" height="1" fill="var(--pixel-accessory)"/>
        <rect x="3"  y="7" width="3" height="1" fill="var(--pixel-accessory)"/>
        <rect x="4"  y="8" width="1" height="1" fill="var(--pixel-accessory)"/>
        <rect x="19" y="6" width="1" height="1" fill="var(--pixel-accessory)"/>
        <rect x="18" y="7" width="3" height="1" fill="var(--pixel-accessory)"/>
        <rect x="19" y="8" width="1" height="1" fill="var(--pixel-accessory)"/>
      </g>
    </svg>

    <span class="sparkle s1">✦</span>
    <span class="sparkle s2">✧</span>
    <span class="sparkle s3">⊹</span>
  </div>

  <!-- Name -->
  <div class="char-name-wrap">
    <div *ngIf="!editingName()" class="char-name" (click)="startEditName()" title="Click to edit">
      {{ game.character().name }}
      <span class="edit-hint">✏️</span>
    </div>
    <input *ngIf="editingName()"
           class="name-input"
           [(ngModel)]="tempName"
           (keyup.enter)="saveName()"
           (blur)="saveName()"
           autofocus
           maxlength="20"/>
  </div>

  <!-- Title -->
  <div class="char-title-wrap">
    <div *ngIf="!editingTitle()" class="char-title" (click)="startEditTitle()" title="Click to edit">
      ✦ {{ game.character().title }} ✦
    </div>
    <input *ngIf="editingTitle()"
           class="title-input"
           [(ngModel)]="tempTitle"
           (keyup.enter)="saveTitle()"
           (blur)="saveTitle()"
           autofocus
           maxlength="30"/>
  </div>

  <!-- Level badge -->
  <div class="level-badge">
    <span class="pixel">Lv.{{ game.character().level }}</span>
  </div>

  <!-- Mini skills -->
  <div class="mini-skills">
    <div class="mini-skill" *ngFor="let skill of topSkills" (click)="gainSkillXp(skill.id)">
      <span class="skill-icon">{{ skill.icon }}</span>
      <div class="skill-info">
        <span class="skill-name">{{ skill.name }}</span>
        <div class="progress-track skill-track">
          <div class="progress-fill" [style.width.%]="(skill.xp / skill.xpToNext) * 100" [style.background]="skill.color"></div>
        </div>
      </div>
      <span class="skill-lvl">{{ skill.level }}</span>
    </div>
  </div>
</div>
